name: "autonomy_stack_bc_rgb_state"
description: "Behavior cloning with RGB state input"

model:
  type: "policy_cnn"
  input_channels: 3
  input_height: 64
  input_width: 64
  parameters: 191012

training:
  learning_rate: 1e-3
  batch_size: 32
  epochs: 10
  loss: "mse"

data:
  train_split: 0.8
  val_split: 0.2
  augmentation: true

device: "cpu"
